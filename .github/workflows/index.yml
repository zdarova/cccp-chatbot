name: Run Indexer

on:
  workflow_dispatch:
    inputs:
      pdf_path:
        description: 'Path to PDF files to index'
        required: false
        default: 'docs/'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r indexer/requirements.txt
      - name: Index guidance documents
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          PG_CONNECTION_STRING: ${{ secrets.PG_CONNECTION_STRING }}
        run: python indexer/index_guidance.py ${{ github.event.inputs.pdf_path }}
