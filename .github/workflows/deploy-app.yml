name: Deploy Chatbot App

on:
  push:
    branches: [main]
    paths: ['app/**', 'web/**', 'Dockerfile']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: crcccppibz5vm5tus3o
  CONTAINER_APP: cccp-chatbot
  RESOURCE_GROUP: rg-cccp-poc
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest
      - name: Run unit tests
        run: pytest tests/ -v

  build:
    name: 🏗️ Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build image in ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --resource-group $RESOURCE_GROUP \
            --image cccp-chatbot:${{ github.sha }} \
            --image cccp-chatbot:latest \
            --file Dockerfile \
            .

  deploy:
    name: 🚀 Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/cccp-chatbot:${{ github.sha }}
      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -s https://cccp-chatbot.agreeablecliff-8b7135c2.northeurope.azurecontainerapps.io/api/health | jq -r .status)
          echo "Health: $STATUS"
          [ "$STATUS" = "ok" ] && echo "✅ Deployment verified" || echo "⚠️ Health check pending"
