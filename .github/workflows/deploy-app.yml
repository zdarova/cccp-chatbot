name: Deploy Chatbot App

on:
  push:
    branches: [main]
    paths: ['app/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: crcccppibz5vm5tus3o
  CONTAINER_APP: cccp-chatbot
  RESOURCE_GROUP: rg-cccp-poc
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build image in ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --resource-group $RESOURCE_GROUP \
            --image cccp-chatbot:${{ github.sha }} \
            --image cccp-chatbot:latest \
            --file app/Dockerfile \
            app/
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/cccp-chatbot:${{ github.sha }}
